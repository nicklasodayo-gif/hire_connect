<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hireConnect Login</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/scripts.js">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container-mb-5">

    <h1>JobConnect</h1>
    <div class="subtitle">Find Your Dream Job Today</div>

    <form>

        <input type="email" placeholder="Email Address"><br>

        <input type="password" placeholder="Password"><br>

        <div class="remember">
            <input type="checkbox"> Remember Me
        </div>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">LOGIN</button>

        <div class="or">----------- OR -----------</div>

        <div class="social">
            <button type="button">Continue with Google</button>
            <button type="button">Continue with LinkedIn</button>
        </div>

        <div class="link">
            Don't have an account? <a href="#">Create Account</a>
        </div>

        <div class="roles">
            <p>Select Account Type:</p>
            <label><input type="radio" name="role" checked> Job Seeker</label><br>
            <label><input type="radio" name="role"> Employer</label>
        </div>

    </form>

</div>
</body>
</html>
